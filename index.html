<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI将棋</title>
  <base id="app-base" href="/aisyougi/">
  <script>
    (function () {
      var host = location.hostname;
      if (host === 'localhost' || host === '127.0.0.1') {
        var path = location.pathname.replace(/[^/]*$/, '');
        document.getElementById('app-base').href = path || '/';
      }
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="top-bar-title">
        <h1>AI将棋</h1>
        <p class="subtitle">先手 vs 後手（AI）</p>
      </div>
      <div id="status" class="status">あなたの番</div>
    </header>

    <div id="clock-panel" class="clock-panel">
      <div class="clock-item" id="clock-row-sente">
        <span class="clock-label">先手</span>
        <span id="clock-sente" class="clock-value">0:00</span>
        <span id="clock-sente-last" class="clock-last"></span>
      </div>
      <div class="clock-item" id="clock-row-gote">
        <span class="clock-label">後手</span>
        <span id="clock-gote" class="clock-value">0:00</span>
        <span id="clock-gote-last" class="clock-last"></span>
      </div>
      <div class="clock-item clock-total">
        <span class="clock-label">対局</span>
        <span id="clock-total" class="clock-value">0:00</span>
      </div>
    </div>

    <div class="game-area">
      <div class="gote-area">
        <img
          id="ai-icon"
          class="ai-icon"
          src="assets/ai-icon.png"
          alt="AI対戦相手"
          width="40"
          height="40"
        >
        <div id="gote-hand" class="hand gote-hand"></div>
      </div>

      <div class="board-wrapper">
        <div class="board-labels">
          <div class="file-labels">
            <span>9</span><span>8</span><span>7</span><span>6</span><span>5</span>
            <span>4</span><span>3</span><span>2</span><span>1</span>
          </div>
          <div class="board-with-ranks">
            <div class="rank-labels">
              <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span>
              <span>六</span><span>七</span><span>八</span><span>九</span>
            </div>
            <div id="board" class="board"></div>
          </div>
        </div>
      </div>

      <div id="sente-hand" class="hand sente-hand"></div>
    </div>

    <div class="controls">
      <div class="level-select">
        <label for="ai-level">AI</label>
        <select id="ai-level" aria-label="AIの強さ"></select>
      </div>
      <button id="new-game" type="button" class="btn-primary">新しい対局</button>
    </div>
  </div>

  <div id="promotion-modal" class="modal hidden">
    <div class="modal-content">
      <p>成りますか？</p>
      <div class="modal-buttons">
        <button id="promo-yes" type="button" class="btn-primary">成る</button>
        <button id="promo-no" type="button" class="btn-secondary">成らない</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
