name: Deploy to ksystemapp.com

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-1
      S3_BUCKET: ksystemapp-web-production
      S3_PREFIX: aisyougi
      CLOUDFRONT_DISTRIBUTION_ID: E2PVD76VHGLFRI
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Ensure UTF-8 sources
        run: python infra/ensure-utf8.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::345362761619:role/kakeibo-api-github-actions-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync . "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "infra/*" \
            --exclude ".gitignore" \
            --exclude ".gitattributes" \
            --exclude "*.zip" \
            --exclude "sticker-fn.js" \
            --exclude "aisyougi-fn-live.js" \
            --exclude "kakeibo-fn.zip" \
            --exclude "out.zip" \
            --exclude "backend/*" \
            --exclude ".venv/*" \
            --exclude "docker-compose.yml" \
            --exclude ".dockerignore"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/${{ env.S3_PREFIX }}/*"